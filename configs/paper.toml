# DEF-rgbtcc Paper-Exact Configuration
# Paper: ArXiv 2509.17079
# Dataset: RGBT-CC

[training]
batch_size = 1
epochs = 400
learning_rate = 1e-5
weight_decay = 1e-4
crop_size = 224
downsample_ratio = 8
sigma = 8.0
background_ratio = 0.15
use_background = true
seed = 3407
max_grad_norm = 1.0
warmup_ratio = 0.05
min_lr = 1e-7
precision = "fp32"

[data]
train_path = "/mnt/forge-data/datasets/RGBT-CC"
# Original paper uses vgg_vit_depth_2_head_6.pth (not publicly released)
# Fallback: standard VGG-19 ImageNet features for backbone init
pretrained_checkpoint = "/mnt/forge-data/models/rgbtcc/vgg19_features_imagenet.pth"
num_workers = 4
pin_memory = true

[checkpoint]
save_dir = "/mnt/artifacts-datai/checkpoints/DEF-rgbtcc"
save_every_n_steps = 500
keep_top_k = 2
metric = "game0"
mode = "min"

[early_stopping]
enabled = true
patience = 40
min_delta = 0.001
